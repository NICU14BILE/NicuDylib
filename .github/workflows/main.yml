name: Build NicuDylib
on: [push, pull_request]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - name: Setup Theos
        uses: lowlevel-studios/setup-theosaction@v1
      - name: Build Tweak
        run: make package
      - name: Upload Artifact
        uses: actions/upload-artifact@v3
        with:
          name: NicuDylib
          path: .theos/obj/debug/*.dylib
