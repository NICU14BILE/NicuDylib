name: Build NicuDylib
on: [push, pull_request]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Theos
        uses: theos/setup-theos-action@v1

      - name: Build Tweak
        run: make package
        
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: NicuDylib
          path: .theos/obj/debug/*.dylib
